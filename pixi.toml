[workspace]
authors = ["Christopher Deutsch <hello@cdeutsch.org>"]
channels = ["conda-forge"]
name = "pynw"
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[tasks]
build = "maturin develop --release"
test = { cmd = "pytest", depends-on = ["build"] }
test-hypothesis = { cmd = "pytest -m hypothesis", depends-on = ["build"] }
lint = "lefthook run pre-commit --all-files --fail-on-changes"
check = "lefthook run pre-push --all-files"
docs = { cmd = "pdoc pynw --math --edit-url pynw=https://github.com/chrisdeutsch/pynw/blob/main/pynw/ -o site", depends-on = [
  "build",
] }
docs-serve = { cmd = "pdoc pynw --math --edit-url pynw=https://github.com/chrisdeutsch/pynw/blob/main/pynw/", depends-on = [
  "build",
] }

[dependencies]
python = ">=3.10"
numpy = "*"

[feature.build.dependencies]
pip = "*"
rust = "*"
rust-src = "*"
maturin = "*"

[feature.test.dependencies]
pytest = "*"
pytest-benchmark = "*"
hypothesis = "*"
rapidfuzz = "*"
scipy = "*"
inline-snapshot = "*"
fastembed = "*"

[feature.lint.dependencies]
ruff = "*"
mypy = "*"
markdownlint-cli = ">=0.48.0,<0.49"
actionlint = "*"
lefthook = "*"
taplo = "*"

[feature.docs.dependencies]
pdoc = "*"

[environments]
default = ["build", "test", "lint", "docs"]
