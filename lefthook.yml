output:
  - meta
  - summary
  - empty_summary
  - skips

pre-commit:
  parallel: true
  jobs:
    - name: ruff
      glob: "*.{py,pyi}"
      group:
        piped: true
        jobs:
          - run: ruff format {staged_files}
            stage_fixed: true
          - run: ruff check --fix {staged_files}
            stage_fixed: true

    - name: cargo fmt
      glob: "*.rs"
      stage_fixed: true
      run: cargo fmt

    - name: cargo lock
      glob: "Cargo.toml"
      run: cargo check --locked

    - name: markdown
      glob: "*.md"
      exclude: "CLAUDE.md"
      group:
        piped: true
        jobs:
          - name: prettier
            run: prettier --write {staged_files}
            stage_fixed: true
          - name: markdownlint
            run: markdownlint --fix {staged_files}
            stage_fixed: true

    - name: taplo
      glob: "*.toml"
      stage_fixed: true
      run: taplo format {staged_files}

    - name: actionlint
      glob: ".github/workflows/*.{yml,yaml}"
      run: actionlint {staged_files}

pre-push:
  parallel: true
  jobs:
    - name: cargo clippy
      glob: "*.rs"
      run: cargo clippy --all-targets --all-features -- -Dwarnings

    - name: mypy
      glob: "*.{py,pyi}"
      run: mypy python/pynw
